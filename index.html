<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Beginning | August 28, 2026</title>
    
    <!-- Fonts: Elegant Serif and Clean Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for the elegant heart icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Initials separated by a glowing heart -->
        <div class="initials">
            <span>M</span>
            <i class="fa-solid fa-heart heart-icon"></i>
            <span>S</span>
        </div>
        
        <h1>The Countdown to Our Forever</h1>
        <div class="date-string">August 28, 2026</div>

        <!-- Countdown Timer -->
        <div class="timer-container">
            <div class="timer-box">
                <div id="days" class="number">00</div>
                <div class="label">Days</div>
            </div>
            <div class="timer-box">
                <div id="hours" class="number">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="timer-box">
                <div id="minutes" class="number">00</div>
                <div class="label">Mins</div>
            </div>
            <div class="timer-box">
                <div id="seconds" class="number">00</div>
                <div class="label">Secs</div>
            </div>
        </div>

        <!-- Dynamic Percentile Tracking Section -->
        <div class="progress-section">
            <div class="progress-text">Our Journey to August 28: <span id="percent-value">0.00%</span> Complete</div>
            <div class="progress-bar-container">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Dynamic Quranic Quote Panel -->
        <div class="quote-container">
            <p id="quran-quote" class="quran-text"></p>
            <p id="quran-surah" class="quran-reference"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
